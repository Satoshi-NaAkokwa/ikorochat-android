name: Build APK - Single Job

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          components: 'platform-tools,platforms;android-35,build-tools;35.0.0'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          set -e
          echo "=== Starting Gradle build ==="
          echo "Current directory: $(pwd)"
          echo "Files in current dir:"
          ls -la
          echo "Gradle wrapper exists: $(test -f gradlew && echo YES || echo NO)"
          echo "Gradle wrapper is executable: $(test -x gradlew && echo YES || echo NO)"
          echo "Building APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace --console=plain || (echo "BUILD FAILED" && exit 1)
        timeout-minutes: 30
        env:
          JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            app/build/
            gradle-app.setting
          retention-days: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Ikoro-Wallet-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
