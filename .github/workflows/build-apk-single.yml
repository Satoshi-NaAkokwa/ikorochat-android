name: Build APK - Single Job

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          components: ['platform-tools', 'platforms;android-35', 'build-tools;35.0.0']

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          echo "=== Starting Gradle build ==="
          echo "Gradle version: $(./gradlew --version)"
          echo "Android SDK path: $ANDROID_HOME"
          echo "Available SDK components:"
          ls -la $ANDROID_HOME
          echo "Building APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace --console=plain
        timeout-minutes: 30
        env:
          JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
