name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*' # Triggers for tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: Cache Gradle files
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APKs (signed with debug key)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: List APK files
        run: |
          echo "APK files built:"
          find app/build/outputs/apk/debug -name "*.apk" -type f -exec ls -lh {} \;

      - name: Rename APKs for GitHub Release
        run: |
          cd app/build/outputs/apk/debug
          [ -f "app-arm64-v8a-debug.apk" ] && mv app-arm64-v8a-debug.apk ikorochat-android-arm64.apk
          [ -f "app-armeabi-v7a-debug.apk" ] && mv app-armeabi-v7a-debug.apk ikorochat-android-arm32.apk
          [ -f "app-x86_64-debug.apk" ] && mv app-x86_64-debug.apk ikorochat-android-x86_64.apk
          [ -f "app-x86-debug.apk" ] && mv app-x86-debug.apk ikorochat-android-x86.apk
          [ -f "app-universal-debug.apk" ] && mv app-universal-debug.apk ikorochat-android-universal.apk

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ikorochat-android-release-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ikorochat-android-release-${{ github.ref_name }}
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ikorochat-android-arm64.apk
            release/ikorochat-android-arm32.apk
            release/ikorochat-android-x86_64.apk
            release/ikorochat-android-x86.apk
            release/ikorochat-android-universal.apk
          name: Release ${{ github.ref_name }}
          body: |
            **Debug APKs (signed with debug key - installable)**
            
            **ikorochat-android-arm64.apk** - ARM64 (most phones) ← Recommended
            **ikorochat-android-arm32.apk** - ARM 32-bit (older phones)
            **ikorochat-android-x86_64.apk** - x86_64 (Chromebooks, emulators)
            **ikorochat-android-x86.apk** - x86 (emulators)
            **ikorochat-android-universal.apk** - All architectures (fallback)
            
            Note: These are debug-signed APKs. You may need to enable "Install from Unknown Sources" in your Android settings.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}