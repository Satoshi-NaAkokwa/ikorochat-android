name: Build Wallet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug build'
        required: false
        default: 'false'
        type: choice
        options:
        - 'true'
        - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Debug info
        run: |
          echo "=== GitHub Context ==="
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo ""
          echo "=== Runner Info ==="
          echo "Runner: ${{ runner.os }}"
          echo "Host: ${{ runner.host }}"
          echo ""

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}
          submodules: 'recursive'

      - name: Verify checkout
        run: |
          echo "=== Checkouts successful ==="
          ls -la
          git log --oneline -1
          git remote -v

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          echo "=== Building APK ==="
          echo "GRADLE_OPTS: ${GRADLE_OPTS:-default}"
          ./gradlew assembleRelease --no-daemon --stacktrace || exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "Gradle version:"
            ./gradlew --version
            echo "Java version:"
            java -version
            exit $exit_code
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Verify APK
        run: |
          echo "=== APK Verification ==="
          if [ -f "app/build/outputs/apk/release/*.apk" ]; then
            echo "✅ APK built successfully!"
            ls -lh app/build/outputs/apk/release/*.apk
          else
            echo "❌ APK not found!"
            find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK files in build output"
            exit 1
          fi
