name: Build Wallet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Debug info
        run: |
          echo "=== GitHub Context ==="
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo ""
          echo "=== Runner Info ==="
          echo "Runner: ${{ runner.os }}"
          echo "Host: ${{ runner.host }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          echo "=== Checkout successful ==="
          ls -la
          git log --oneline -1
          git remote -v || echo "No remote configured"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          echo "=== Building APK ==="
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Verify APK
        run: |
          echo "=== APK Verification ==="
          if [ -f "app/build/outputs/apk/release/*.apk" ]; then
            echo "✅ APK built successfully!"
            ls -lh app/build/outputs/apk/release/*.apk
          else
            echo "❌ APK not found!"
            find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
            echo "Build output directory:"
            ls -la app/build/outputs/apk/ 2>/dev/null || echo "No APK output directory"
            exit 1
          fi
