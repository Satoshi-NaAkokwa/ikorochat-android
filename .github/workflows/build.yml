name: Build Ikoro Wallet APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify gradlew
        run: ls -la gradlew

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          components: 'platform-tools,platforms;android-35,build-tools;35.0.0'

      - name: Build Debug APK with Debug Info
        run: |
          echo "=== Gradle version ==="
          ./gradlew --version
          
          echo "=== Android SDK info ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          
          echo "=== Building Debug APK ==="
          ./gradlew assembleDebug --stacktrace --no-daemon --info 2>&1 | tee /tmp/gradle.log
          
          echo "=== Checking APK ==="
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "APK not found!"
            ls -la app/build/outputs/apk/debug/
            exit 1
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
