name: Build APK (main branch)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKs (all variants)
        run: |
          ./gradlew assembleDebug --console=plain --no-daemon

      - name: Upload APK artifacts (all variants)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-all-variants
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release (tagged commits only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --notes "IkoroChat ${GITHUB_REF#refs/tags/}" \
            app/build/outputs/apk/debug/*.apk