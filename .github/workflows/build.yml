name: Build Wallet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (DEBUG)
        run: |
          echo "=== Building APK ==="
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Verify APK
        run: |
          echo "=== Verification ==="
          echo "1. Checking for hardcoded secrets..."
          if grep -r "api.key\|password\|secret\|token" --include="*.kt" app/src/main/java/com/ikoro/android/wallet/ 2>/dev/null | grep -v "private_key_encrypted\|encrypted\|SecretKey"; then
            echo "WARNING: Potential hardcoded secrets found!"
            exit 1
          fi
          echo "No hardcoded secrets found"
          
          echo "2. Verifying APK exists..."
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "ERROR: APK not found!"
            find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          echo "APK found!"
          ls -lh app/build/outputs/apk/debug/
          
          echo "=== BUILD SUCCESSFUL ==="
