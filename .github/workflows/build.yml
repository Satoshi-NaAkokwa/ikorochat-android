name: Build Ikoro Wallet APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify gradlew
        run: ls -la gradlew

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          components: 'platform-tools,platforms;android-35,build-tools;35.0.0'

      - name: Build Debug APK
        run: |
          echo "=== Building Debug APK ==="
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+UseG1GC"
          ./gradlew assembleDebug --no-daemon --stacktrace > /tmp/gradle.log 2>&1
          BUILD_STATUS=$?
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "=== GRADLE BUILD FAILED ==="
            tail -n 200 /tmp/gradle.log
            exit $BUILD_STATUS
          fi
          echo "=== Build completed successfully ==="

      - name: Verify APK exists
        run: |
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "ERROR: APK not found at expected path"
            find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
            exit 1
          fi
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
