name: Build Ikoro Wallet APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          components: 'platform-tools,platforms;android-35,build-tools;35.0.0'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK
        run: |
          echo "=== Checking for APK ==="
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK found!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "APK not found - listing all APK files..."
            find app -name "*.apk" 2>/dev/null || echo "No APK files found"
            echo "Listing build directory..."
            ls -laR app/build/ 2>/dev/null | head -50
            exit 1
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Ikoro-Wallet-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
