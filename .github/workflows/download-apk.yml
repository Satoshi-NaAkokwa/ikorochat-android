name: Download APK from GitHub Actions

on: [workflow_run]

jobs:
  download:
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.status == 'completed'
    runs-on: ubuntu-latest

    steps:
      - name: Download APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download artifacts from workflow run
          echo "Download URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
